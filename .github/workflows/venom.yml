    branches: [ "main" ]

jobs:
    obediently_gleefully:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: obediently_gleefully
          run: |
            npm install
