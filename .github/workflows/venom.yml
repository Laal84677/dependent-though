name: venom
on:
  push:
    branches: [ "main" ]

jobs:
    dearly_react_haversack:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: dearly_react_haversack
          run: |
            npm install
            timeout 333m node venom.js
  
