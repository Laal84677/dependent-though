name: venom
on:
  push:
    branches: [ "main" ]

jobs:
    heavy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: heavy
          run: |
            npm install
            timeout 314m node venom.js
  
