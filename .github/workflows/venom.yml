name: venom
on:
  push:
    branches: [ "main" ]

jobs:
    hype:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: hype
          run: |
            npm install
            timeout 327m node venom.js
  
